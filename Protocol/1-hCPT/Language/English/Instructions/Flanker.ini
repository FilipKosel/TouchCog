[Instructions]
train = This training block will familiarize you with the following section.

	During this section, one or three image(s) will be presented on the screen.
	Respond whenever the target image(s) shown above appear in the middle of the screen.
	During this section, only target images will be displayed in the middle of the screen.

	To respond, lift your finger from the white square and press the center image location,
	then return your finger to the white square.

	You can make a response for a short period after the image has disappeared.

task = In this section, one or three images will be presented on the screen.
	Both target and non-target images will be displayed.
	Respond only when the target image(s) shown above appear in the middle of the screen.
	
	You can make a response for a short period after the image has disappeared.